<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Kudbee Darts — swipe-to-throw flick darts with real throw physics, 501 & Cricket, a digital scoreboard, an on-board checkout guide, smart AI leagues and unlockable skins. A playable browser game by Kudbee Games Studio.">
<meta name="theme-color" content="#05050f">
<title>Kudbee Darts — Bullseye League</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #05050f;
    color: #cfe9ff;
    font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
  }
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(circle at 50% 0%, rgba(57,230,255,0.10), transparent 60%),
      #05050f;
  }
  /* Near-square frame so the dartboard reads large (logical 960x720 -> 1.333). */
  #frame {
    position: relative;
    width: min(100vw, calc(100vh * 1.3333));
    height: min(100vh, calc(100vw / 1.3333));
    box-shadow: 0 0 60px rgba(57,230,255,0.18), inset 0 0 0 1px rgba(57,230,255,0.12);
    border-radius: 8px;
    overflow: hidden;
    background: #05050f;
  }
  canvas {
    display: block; width: 100%; height: 100%;
    image-rendering: optimizeQuality;
    touch-action: none;            /* critical: keep the drag gesture for aiming */
  }
  .back-link {
    position: absolute; top: 10px; left: 12px; z-index: 30;
    font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase;
    color: #9fb6c8; text-decoration: none; padding: 6px 10px;
    border: 1px solid rgba(159,182,200,0.25); border-radius: 6px;
    background: rgba(5,5,15,0.5); backdrop-filter: blur(6px);
    transition: all 0.2s;
  }
  .back-link:hover { color: #fff; border-color: #39e6ff; }
  .hint {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    z-index: 10; font-size: 11px; color: #45586a; letter-spacing: 0.05em;
    pointer-events: none;
  }
  @media (pointer: coarse) { .hint { display: none; } }
</style>
</head>
<body>
<div id="stage">
  <div id="frame">
    <a class="back-link" href="../../index.html#games">&larr; Studio</a>
    <canvas id="game" width="960" height="720"></canvas>
    <div class="hint">drag to aim · swipe-release to throw · P pause · M mute · ~ FPS</div>
  </div>
</div>

<!-- Engine + game modules loaded as ordered classic scripts (no bundler).
     Everything attaches to the global window.KD namespace. -->
<script src="../shared/engine/core-util.js"></script>
<script src="../shared/engine/loop.js"></script>
<script src="src/engine/util.js"></script>
<script src="src/engine/loop.js"></script>
<script src="src/engine/input.js"></script>
<script src="src/engine/camera.js"></script>
<script src="src/engine/audio.js"></script>
<script src="src/engine/particles.js"></script>
<script src="src/art/sprites.js"></script>
<script src="src/world/board.js"></script>
<script src="src/entities/dart.js"></script>
<script src="src/entities/players.js"></script>
<script src="src/modes/x01.js"></script>
<script src="src/modes/cricket.js"></script>
<script src="src/progression.js"></script>
<script src="src/game.js"></script>
<script>
  (function () {
    var canvas = document.getElementById('game');
    var game = new KD.Game({ canvas: canvas });

    // Load the asset manifest (procedural fallback if absent), then start.
    game.sprites.load('assets/manifest.json').then(function () {
      game.start();
    });

    // Unlock audio on the first interaction (browser autoplay policy).
    var unlock = function () {
      game.audio.unlock();
      if (!game.progression.data.settings.sound) game.audio.setEnabled(false);
      window.removeEventListener('pointerdown', unlock);
      window.removeEventListener('keydown', unlock);
    };
    window.addEventListener('pointerdown', unlock);
    window.addEventListener('keydown', unlock);
  })();
</script>
</body>
</html>
