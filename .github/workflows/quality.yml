# Quality guardrails — link checking + HTML sanity for the zero-build static site.
#
# WHY: this repo is hand-written vanilla HTML/CSS/JS deployed on Cloudflare Pages.
# The bugs we keep hitting are (a) our OWN broken local links — e.g. an old `/game/`
# href that 404'd — and (b) basic structural HTML mistakes (duplicate ids, unclosed
# tags). This workflow catches those on every PR.
#
# DBZ-059 (Polish Lane 12) added two more jobs on top of the original two:
# a Playwright smoke suite (real Chromium pass over the home page) and a
# Lighthouse CI budget check (performance/SEO/accessibility category scores).
# Both follow the exact same advisory pattern as the original two jobs below.
#
# ADVISORY / NON-BLOCKING (on purpose, for now):
#   All four checks run with `continue-on-error: true`, so this workflow SURFACES
#   problems in the PR's Checks tab but never blocks a merge. None of them are
#   required status checks yet — each new tool runs on its own introductory PR too,
#   and we don't want to hard-gate everything before we've watched a few real runs
#   and confirmed the repo is clean. Once a job has been green on a few PRs, promote
#   it to required by:
#     1. removing `continue-on-error: true` from that job's step(s), and
#     2. adding "Quality guardrails / <job name>" to the branch protection required checks.
#   (Empirically, against the current repo: link-check + html-sanity already pass —
#   see PR #114 and prior. The two DBZ-059 jobs have been verified locally against
#   this exact branch — see PR body for the real numbers — but have not yet been
#   observed running on GitHub's own runners; "expected green," not confirmed green.)
#
# Scope note: only the site's own HTML is linted. `.agents/skills/**` holds third-party
# React/Vue auth scaffolding templates we don't author, so it is excluded.

name: Quality guardrails

on:
  pull_request:
    paths:
      - "**/*.html"
      - ".github/workflows/quality.yml"
      - ".htmlhintrc"
      - ".lycheeignore"
      - ".lighthouserc.json"
      - "tests/quality/**"
  push:
    branches: [main]
    paths:
      - "**/*.html"
      - ".github/workflows/quality.yml"
      - ".htmlhintrc"
      - ".lycheeignore"
      - ".lighthouserc.json"
      - "tests/quality/**"

# Avoid piling up redundant runs on rapid pushes to the same PR/branch.
concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  link-check:
    name: Link check (internal links)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Lint only the site's own HTML, skipping vendored skill templates.
      - name: Collect tracked HTML (excluding .agents/)
        id: collect
        run: |
          {
            echo 'files<<EOF'
            git ls-files '*.html' | grep -v '^\.agents/'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      # Internal link checker. We verify ONLY file-scheme (local/relative + root-
      # relative) links: `--scheme file` plus `--root-dir` resolves "/foo" the same
      # way Cloudflare Pages does (repo root = site root). External http(s) URLs are
      # excluded via `.lycheeignore` and are NOT failed on. We also don't fail on
      # transient network conditions (timeouts / 429s) for any link that is checked.
      #
      # `fail: true` makes lychee-action surface broken INTERNAL links as a failed
      # step; the surrounding `continue-on-error: true` keeps that advisory for now.
      - name: Check internal links (lychee)
        continue-on-error: true
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --scheme file
            --root-dir "$GITHUB_WORKSPACE"
            --exclude-path .agents
            --accept 200..=299,403,429
            --max-retries 1
            ${{ steps.collect.outputs.files }}
          fail: true
          # Don't fail the action on lychee's own emptiness/format edge cases.
          failIfEmpty: false

  html-sanity:
    name: HTML sanity (htmlhint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Structural HTML check with a deliberately PRAGMATIC ruleset (see .htmlhintrc):
      # we fail on real errors (duplicate ids, unclosed/mismatched tags, missing
      # doctype/title, empty src) but NOT on opinionated style rules (inline styles,
      # inline scripts, single-quoted attrs) that the current hand-written files use.
      # Verified locally: htmlhint passes clean on all current site HTML.
      # `continue-on-error: true` keeps this advisory for now (see header).
      - name: Lint tracked HTML (htmlhint)
        continue-on-error: true
        run: |
          mapfile -t files < <(git ls-files '*.html' | grep -v '^\.agents/')
          echo "Linting ${#files[@]} HTML files"
          npx --yes htmlhint@1 --config .htmlhintrc "${files[@]}"

  playwright-smoke:
    name: Playwright smoke suite (home page)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Self-contained under tests/quality/ (its own package.json — playwright
      # only) so the root repo stays dependency-free/zero-build. See
      # tests/quality/smoke.mjs for exactly what's checked (DBZ-059, Polish Lane
      # 12): the home page renders with zero console/page errors at 1440px and
      # 390px, the pinned scrollytelling section (#storyOuter/.pin) actually
      # engages while scrolling, the live agent answers a real question from its
      # local KB, and the reduced-motion render still delivers the content
      # statically. tests/quality/server.mjs serves the repo root itself the
      # same way Cloudflare Pages does — no separate dev-server step needed.
      - name: Install smoke-suite dependencies
        working-directory: tests/quality
        run: npm install

      - name: Install Chromium (Playwright)
        working-directory: tests/quality
        run: npx playwright install --with-deps chromium

      # ADVISORY (DBZ-032 precedent, see header): continue-on-error keeps this
      # from blocking a merge while the suite proves itself out on a few real
      # runs. Promote later per the header's instructions.
      - name: Run Playwright smoke suite
        continue-on-error: true
        working-directory: tests/quality
        run: npm run smoke

  lighthouse-budget:
    name: Lighthouse CI budget (perf/SEO/a11y)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # @lhci/cli's `autorun` serves `.` (the repo root) as a static site itself
      # (see .lighthouserc.json's `staticDistDir`) and drives Lighthouse against
      # /index.html — no separate server step needed. Relies on the Chrome that
      # ships preinstalled on GitHub-hosted ubuntu-latest runners (chrome-launcher
      # auto-detects it); if a future runner image drops it, this step would need
      # an explicit Chrome install added.
      #
      # Budgets (DBZ-059): performance >= 90, SEO = 100, accessibility >= 95 —
      # asserted at "error" level in .lighthouserc.json so a real miss is
      # surfaced as a failed step in the Checks tab; continue-on-error below
      # keeps that advisory/non-blocking for now (DBZ-032 precedent, see header).
      # numberOfRuns is 1 for CI speed, so treat this as a smoke-level budget
      # check, not a certified median score.
      - name: Run Lighthouse CI
        continue-on-error: true
        run: npx --yes @lhci/cli@0.15 autorun --config=./.lighthouserc.json
